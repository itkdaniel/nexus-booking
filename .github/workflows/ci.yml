name: nexus-booking CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/ --select E,W,F,I --ignore E501,W503

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            -m unit \
            --cov=app \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret"
          EMAIL_ENABLED: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage-unit.xml

  # ── BDD tests ───────────────────────────────────────────────────────────────
  bdd-tests:
    name: BDD Tests (pytest-bdd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run BDD tests
        run: |
          pytest tests/bdd/ -v \
            --tb=short \
            -m bdd
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret"
          EMAIL_ENABLED: "false"

  # ── Property tests ──────────────────────────────────────────────────────────
  property-tests:
    name: Property Tests (Hypothesis / DDT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run property tests
        run: |
          pytest tests/property/ -v \
            --tb=short \
            -m property
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret"
          EMAIL_ENABLED: "false"

  # ── Regression tests ────────────────────────────────────────────────────────
  regression-tests:
    name: Regression / Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run regression tests
        run: |
          pytest tests/regression/ -v \
            --tb=short \
            -m regression
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret"
          EMAIL_ENABLED: "false"

  # ── E2E tests ───────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (full booking flow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -v \
            --tb=short \
            -m e2e
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret"
          EMAIL_ENABLED: "false"

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, regression-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nexus-booking:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (main only) ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [unit-tests, bdd-tests, regression-tests, e2e-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
