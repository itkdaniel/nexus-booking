[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no I/O)
    bdd: Behaviour-driven tests (pytest-bdd)
    property: Property-based tests (hypothesis)
    regression: Regression / contract tests
    e2e: End-to-end tests against live app
